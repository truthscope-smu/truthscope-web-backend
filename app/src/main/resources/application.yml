spring:
  application:
    name: truthscope-web-backend

  datasource:
    url: jdbc:postgresql://${SUPABASE_HOST:localhost}:${SUPABASE_PORT:5432}/${SUPABASE_DB:postgres}
    username: ${SUPABASE_USER:postgres}
    password: ${SUPABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Supabase public 스키마는 기본 객체가 있어 "non-empty" — Flyway가 history 없으면 거부함.
    # baseline-on-migrate로 history 테이블 생성 + baseline 마커 삽입 후 V1 적용.
    # baseline-version=0 필수: 기본값 1이면 V1(version 1)이 "baseline 초과만 적용" 규칙에 걸려 스킵됨.
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.truthscope.web: DEBUG
    org.hibernate.SQL: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      gemini:
        failure-rate-threshold: 30
        wait-duration-in-open-state: 60s
        sliding-window-type: TIME_BASED
        sliding-window-size: 60   # 초 단위 (TIME_BASED 기준)
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 50
        minimum-number-of-calls: 3
        record-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpClientErrorException.TooManyRequests
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException.BadRequest
          - org.springframework.web.client.HttpClientErrorException.Unauthorized
          - org.springframework.web.client.HttpClientErrorException.Forbidden

truthscope:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    prompt-version: "v1.0.0"
    schema-version: "v1.0.0"
  cascade:
    source-count-threshold: 3
    tier1-hit-required: true
    critical-field-cap-percent: 50
    claim-split-fields: ["수치", "일자", "대상", "금액", "제도명"]
  url-validator:
    connect-timeout: PT5S
    read-timeout: PT5S
    redirect-max-depth: 5
    retry-count: 1
    retry-backoff: PT1S
  tier3-reason:
    time-keywords-resource: "classpath:policies/tier3-reason-time-keywords-v1.txt"
    missing-ref-date-threshold-days: 30
