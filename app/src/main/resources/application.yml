spring:
  application:
    name: truthscope-web-backend

  datasource:
    url: jdbc:postgresql://${SUPABASE_HOST:localhost}:${SUPABASE_PORT:5432}/${SUPABASE_DB:postgres}
    username: ${SUPABASE_USER:postgres}
    password: ${SUPABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Supabase public 스키마는 기본 객체가 있어 "non-empty" — Flyway가 history 없으면 거부함.
    # baseline-on-migrate로 history 테이블 생성 + baseline 마커 삽입 후 V1 적용.
    # baseline-version=0 필수: 기본값 1이면 V1(version 1)이 "baseline 초과만 적용" 규칙에 걸려 스킵됨.
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.truthscope.web: DEBUG
    org.hibernate.SQL: DEBUG
